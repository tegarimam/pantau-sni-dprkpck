<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantau SNI - DPRKPCK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
        .tab-active { border-bottom: 4px solid #facc15; color: #facc15; }
        .animate-fadeIn {
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900">

    <nav class="bg-blue-900 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            
            <div class="flex items-center gap-3">
                <img src="logo.png" alt="Logo DPRKPCK" class="h-12 w-auto object-contain bg-white p-1 rounded-full">
                
                <div>
                    <h1 class="text-xl font-black tracking-tight leading-none">PANTAU SNI</h1>
                    <p class="text-[10px] tracking-[0.2em] font-bold text-yellow-400 uppercase">DPRKPCK PROV. JAWA TIMUR</p>
                </div>
            </div>
            
            <div class="relative">
                <button id="menuBtn" class="p-2 hover:bg-blue-800 rounded-lg transition">
                    <svg width="24" height="24" viewBox="0 0 16 16" fill="currentColor"><path d="M9.5 13a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zm0-5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zm0-5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0z"/></svg>
                </button>
                <div id="dropdownMenu" class="hidden absolute right-0 mt-2 w-48 bg-white text-gray-800 border rounded-xl shadow-xl overflow-hidden">
                    <a href="#" class="block px-4 py-3 hover:bg-gray-50 border-b text-sm">Profil Pengguna</a>
                    <a href="#" class="block px-4 py-3 hover:bg-gray-50 border-b text-sm">Panduan Penggunaan</a>
                    <a href="#" class="block px-4 py-3 text-red-600 hover:bg-red-50 text-sm font-bold">Keluar</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-4 md:p-8">
        
        <div class="flex space-x-8 border-b-2 mb-8 text-sm font-bold text-gray-400 overflow-x-auto">
            <button onclick="switchTab('library')" id="tab-library" class="pb-3 tab-active uppercase">📂 Wadah SNI</button>
            <button onclick="switchTab('monitoring')" id="tab-monitoring" class="pb-3 uppercase">📝 Cek Kerja & Laporan</button>
        </div>

        <div id="content-library" class="animate-fadeIn">
            <h2 class="text-xl font-bold mb-4 text-gray-700">Gudang Dokumen Standar</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-white p-6 rounded-2xl border-l-8 border-blue-600 shadow-sm">
                    <h3 class="font-bold text-lg mb-4 text-blue-900">BAGIAN BETON</h3>
                    <div class="space-y-2">
                        <button class="w-full text-left p-4 bg-gray-50 rounded-xl hover:bg-blue-50 border flex justify-between items-center transition">
                            <span>Hitungan Tangga</span>
                            <span class="text-[10px] bg-blue-100 text-blue-800 px-2 py-1 rounded font-bold">BUKA</span>
                        </button>
                        <button class="w-full text-left p-4 bg-gray-50 rounded-xl hover:bg-blue-50 border flex justify-between items-center transition">
                            <span>Hitungan Balok</span>
                            <span class="text-[10px] bg-blue-100 text-blue-800 px-2 py-1 rounded font-bold">BUKA</span>
                        </button>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-2xl border-l-8 border-gray-400 shadow-sm">
                    <h3 class="font-bold text-lg mb-4 text-gray-700">BAGIAN BAJA</h3>
                    <div class="space-y-2">
                        <button class="w-full text-left p-4 bg-gray-50 rounded-xl hover:bg-gray-100 border flex justify-between items-center transition">
                            <span>Hitungan Gording & Rangka</span>
                            <span class="text-[10px] bg-gray-200 text-gray-600 px-2 py-1 rounded font-bold">BUKA</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div id="content-monitoring" class="hidden animate-fadeIn">
            <h2 class="text-xl font-bold mb-4 text-gray-700">Monitoring & Koreksi Otomatis</h2>
            <div class="bg-white p-6 rounded-2xl border shadow-sm">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div>
                        <p class="text-sm text-gray-500 mb-6 italic">Masukkan data dari lapangan/laporan mingguan untuk dicek kesesuaiannya dengan standar SNI.</p>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Item yang Dicek</label>
                                <select id="itemKerja" class="w-full p-3 border-2 rounded-xl bg-gray-50 focus:border-blue-500 outline-none">
                                    <option value="balok">Balok Beton (Tinggi Minimum)</option>
                                </select>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Panjang Bentang (mm)</label>
                                    <input type="number" id="valL" placeholder="Contoh: 6000" class="w-full p-3 border-2 rounded-xl focus:border-blue-500 outline-none">
                                </div>
                                <div>
                                    <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Tinggi Rencana (mm)</label>
                                    <input type="number" id="valH" placeholder="Contoh: 400" class="w-full p-3 border-2 rounded-xl focus:border-blue-500 outline-none">
                                </div>
                            </div>
                            <button onclick="runAutoCorrect()" class="w-full bg-blue-900 text-white font-black py-4 rounded-xl hover:bg-blue-800 transition shadow-lg">CEK KESESUAIAN SEKARANG</button>
                        </div>
                    </div>

                    <div id="statusBox" class="bg-gray-100 border-2 border-dashed rounded-3xl flex flex-col items-center justify-center p-8 text-center min-h-[250px]">
                        <p id="statusMsg" class="text-gray-400 text-sm font-bold uppercase tracking-widest">Menunggu Data Input...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Tab Switcher
        function switchTab(tab) {
            document.getElementById('content-library').classList.toggle('hidden', tab !== 'library');
            document.getElementById('content-monitoring').classList.toggle('hidden', tab !== 'monitoring');
            document.getElementById('tab-library').classList.toggle('tab-active', tab === 'library');
            document.getElementById('tab-monitoring').classList.toggle('tab-active', tab === 'monitoring');
        }

        // Dropdown Logic
        const menuBtn = document.getElementById('menuBtn');
        const dropdown = document.getElementById('dropdownMenu');
        menuBtn.onclick = () => dropdown.classList.toggle('hidden');

        // Logic Auto-Correct SNI
        function runAutoCorrect() {
            const L = parseFloat(document.getElementById('valL').value);
            const h = parseFloat(document.getElementById('valH').value);
            const statusBox = document.getElementById('statusBox');
            const statusMsg = document.getElementById('statusMsg');

            if (!L || !h) {
                alert("Mohon isi panjang bentang dan tinggi rencana!");
                return;
            }

            // Rumus SNI sederhana: L/16 (Tumpuan Sederhana)
            const hMin = Math.ceil(L / 16);

            if (h >= hMin) {
                statusBox.className = "bg-green-100 border-4 border-green-500 rounded-3xl flex flex-col items-center justify-center p-8 text-center shadow-inner animate-fadeIn";
                statusMsg.innerHTML = `
                    <div class="text-5xl mb-4">✅</div>
                    <div class="text-green-900 font-black text-2xl uppercase">SESUAI SNI</div>
                    <div class="text-green-700 text-sm mt-2 font-bold italic">Tinggi balok Anda (${h}mm) sudah aman. Batas minimum SNI adalah ${hMin}mm. Laporan mingguan siap diarsip.</div>
                `;
            } else {
                statusBox.className = "bg-red-100 border-4 border-red-500 rounded-3xl flex flex-col items-center justify-center p-8 text-center shadow-inner animate-fadeIn";
                statusMsg.innerHTML = `
                    <div class="text-5xl mb-4">❌</div>
                    <div class="text-red-900 font-black text-2xl uppercase">TIDAK SESUAI</div>
                    <div class="text-red-700 text-sm mt-2 font-bold italic">Bahaya! Tinggi balok kurang dari standar. Minimal harus ${hMin}mm menurut SNI. Mohon revisi desain/laporan.</div>
                `;
            }
        }
    </script>
</body>
</html>
